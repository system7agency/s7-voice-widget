<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>S7 Voice Widget — plain HTML demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #000000;
        color: #ffffff;
        font-family: ui-sans-serif, system-ui, sans-serif;
        display: grid;
        place-items: center;
      }
      .hint {
        max-width: 440px;
        text-align: center;
        line-height: 1.6;
        opacity: 0.8;
      }
      code {
        font-family: ui-monospace, Menlo, monospace;
        color: #6b78ff;
      }
    </style>
  </head>
  <body>
    <div class="hint">
      <p>Any plain website. The blue widget in the bottom-right is the embed.</p>
      <p>
        Chat &amp; in-browser voice work with just <code>data-agent-id</code>.<br />
        "Get a call" also needs <code>data-api-base</code> pointing at your backend.
      </p>
    </div>

    <!--
      ONE TAG TO EMBED. Replace agent-id with your ElevenLabs public agent id.
      It ships with the system7.ai look by default — nothing else required.
      For get-a-call, add data-api-base pointing at your outbound-call backend.
      To re-theme per site, add optional text/color data-* attributes
      (data-title, data-greeting, data-accent, data-bg, …). See the README.
    -->
    <script
      src="../../dist/s7-voice-widget.js"
      data-agent-id="agent_REPLACE_WITH_YOUR_PUBLIC_AGENT_ID"
    ></script>
  </body>
</html>
